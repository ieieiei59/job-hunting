$schema: "https://json-schema.org/draft/2020-12/schema"
title: Work History Schema
type: object
required:
  - schema_version
  - profile_summary
  - skills
  - experiences
properties:
  schema_version:
    type: integer
    minimum: 1
  profile_summary:
    type: string
    minLength: 1
  skills:
    type: object
    additionalProperties:
      type: array
      items:
        type: string
  experiences:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - period
        - company
        - role
        - projects
      properties:
        period:
          type: object
          required: [from, to]
          properties:
            from:
              type: string
              pattern: '^\d{4}-\d{2}$|^\d{4}-\d{2}-\d{2}$'
            to:
              type: string
              pattern: '^\d{4}-\d{2}$|^\d{4}-\d{2}-\d{2}$|^present$'
        company:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        projects:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              name:
                type: string
              domain:
                type: string
              team_size:
                type: integer
                minimum: 1
              responsibilities:
                type: array
                items:
                  type: string
              tech_stack:
                type: array
                items:
                  type: string
              achievements:
                type: array
                items:
                  type: string
            additionalProperties: false
      additionalProperties: false
additionalProperties: false
