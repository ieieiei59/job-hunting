$schema: "https://json-schema.org/draft/2020-12/schema"
title: Resume Schema
type: object
required:
  - schema_version
  - personal
  - education
  - employment_summary
  - licenses
  - preferences
properties:
  schema_version:
    type: integer
    minimum: 1
  personal:
    type: object
    required:
      - full_name
      - birth_date
      - address
      - phone
      - email
    properties:
      full_name:
        type: string
        minLength: 1
      furigana:
        type: string
      gender:
        type: string
      postal_code:
        type: string
        pattern: '^\d{3}-\d{4}$'
      birth_date:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
      address:
        type: string
        minLength: 1
      contact_address:
        type: string
      phone:
        type: string
        minLength: 1
      email:
        type: string
        format: email
    additionalProperties: false
  motivation:
    type: string
  jis:
    type: object
    properties:
      commute_time:
        type: string
      dependents:
        type: integer
        minimum: 0
      spouse:
        type: string
        enum: [有, 無]
      spouse_support_obligation:
        type: string
        enum: [有, 無]
    additionalProperties: false
  photo:
    type: string
  links:
    type: array
    items:
      type: object
      required: [label, url]
      properties:
        label:
          type: string
        url:
          type: string
          minLength: 1
  education:
    type: array
    items:
      type: object
      required: [date, description]
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}$|^\d{4}-\d{2}-\d{2}$'
        description:
          type: string
  employment_summary:
    type: array
    items:
      type: object
      required: [date, description]
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}$|^\d{4}-\d{2}-\d{2}$'
        description:
          type: string
  licenses:
    type: array
    items:
      type: object
      required: [date, name]
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}$|^\d{4}-\d{2}-\d{2}$'
        name:
          type: string
  preferences:
    type: string
additionalProperties: false
